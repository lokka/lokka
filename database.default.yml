# ActiveRecord Database Configuration
#
# production:
#   adapter: postgresql
#   url: postgres://user:pass@host/database
#
# development:
#   adapter: sqlite3
#   database: db/development.sqlite3
#
production:
  adapter: postgresql
  url: <%= ENV['DATABASE_URL'] %>

development:
  adapter: sqlite3
  database: <%= root %>/db/development.sqlite3
  pool: 5
  timeout: 5000

test:
  adapter: sqlite3
  database: <%= ENV['DATABASE_URL'] ? ENV['DATABASE_URL'].sub('sqlite3://', '') : "#{root}/db/test.sqlite3" %>
  pool: 5
  timeout: 5000
